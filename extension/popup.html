<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Landsat Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <ellipse cx="12" cy="12" rx="4" ry="10" stroke="currentColor" stroke-width="1.5"/>
          <line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>NASA Landsat</h1>
        <p class="subtitle">Image Downloader</p>
      </div>
    </header>

    <!-- Status Badge -->
    <div id="statusBadge" class="status-badge status-checking">
      <span class="status-dot"></span>
      <span id="statusText">Checking page...</span>
    </div>

    <!-- Main Content -->
    <div class="content">
      <!-- Caption Input -->
      <div class="input-group">
        <label for="captionInput">Enter Captions</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="captionInput" 
            placeholder="e.g. HELLO WORLD NASA"
            autocomplete="off"
            spellcheck="false"
          >
          <div class="input-hint">Space-separated • Each word becomes a Landsat image</div>
        </div>
      </div>

      <!-- Caption Tags Preview -->
      <div id="captionPreview" class="caption-preview" style="display: none;">
        <div class="preview-label">Images to generate:</div>
        <div id="captionTags" class="caption-tags"></div>
      </div>

      <!-- Action Buttons -->
      <div class="actions">
        <button id="generateBtn" class="btn btn-primary" disabled>
          <svg viewBox="0 0 24 24" fill="none" class="btn-icon">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <polyline points="7,10 12,15 17,10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>Generate & Download</span>
        </button>
        <button id="openPageBtn" class="btn btn-secondary" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" class="btn-icon">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <polyline points="15,3 21,3 21,9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>Open NASA Page</span>
        </button>
      </div>

      <!-- Progress Section -->
      <div id="progressSection" class="progress-section" style="display: none;">
        <div class="progress-header">
          <span id="progressLabel">Processing...</span>
          <span id="progressCount" class="progress-count">0/0</span>
        </div>
        <div class="progress-bar-track">
          <div id="progressBar" class="progress-bar-fill"></div>
        </div>
        <div id="progressLog" class="progress-log"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>Images saved to <code>Downloads/nasa_images/</code></p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
